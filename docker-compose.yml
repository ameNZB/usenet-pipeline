services:
  vpn:
    image: qmcgaw/gluetun
    container_name: agent-vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # VPN provider config — see https://github.com/qdm12/gluetun-wiki/tree/main/setup/providers
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER:?Set VPN_PROVIDER in .env}
      - VPN_TYPE=${VPN_TYPE:-openvpn}
      - OPENVPN_USER=${VPN_USER:?Set VPN_USER in .env}
      - OPENVPN_PASSWORD=${VPN_PASS:?Set VPN_PASS in .env}
      - SERVER_COUNTRIES=${VPN_COUNTRY:-Netherlands}
      # SOCKS5 proxy for split-tunnel mode (VPN_DOWNLOAD_ONLY=true).
      # The agent connects to vpn:1080 for torrent traffic only.
      - SOCKS5=on
      - SOCKS5_LISTENING_ADDRESS=:1080
      # Gluetun HTTP control server (default :8000). The watchdog hits this
      # on 127.0.0.1:8000 from the shared netns when the site has been
      # unreachable for a while — no need to publish it to the host.
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      # Allow DNS lookups to Docker's embedded resolver. Containers sharing
      # this netns (i.e. the agent below) get /etc/resolv.conf pointing at
      # 127.0.0.11 by default; without this, gluetun's firewall blocks
      # outbound UDP to 127.0.0.11:53 with "operation not permitted" and
      # every site/NNTP/tracker hostname fails to resolve. The DNS query
      # itself then forwards through Docker's configured upstream, which
      # still originates from gluetun's tunnel — no leak.
      - FIREWALL_OUTBOUND_SUBNETS=127.0.0.11/32
    ports:
      # Agent's local config UI. The agent runs in this netns (network_mode:
      # service:vpn on the agent service), so its listen ports are actually
      # owned by this container. Bound to 127.0.0.1 on the host so LAN peers
      # can't edit config/secrets; change the host side if you want remote
      # access (and put a reverse proxy with auth in front of it).
      - "127.0.0.1:${LOCAL_UI_PORT:-4869}:${LOCAL_UI_PORT:-4869}"
    volumes:
      - ${DATA_DIR:-./data}/gluetun:/gluetun
    restart: unless-stopped

  agent:
    build: .
    image: usenet-pipeline:latest
    container_name: indexer-agent
    # VPN routing mode:
    #   VPN_DOWNLOAD_ONLY=false (default): ALL traffic through VPN (kill-switch).
    #     → uncomment network_mode below, comment out the network section.
    #   VPN_DOWNLOAD_ONLY=true: only torrent downloads through VPN (SOCKS5 proxy),
    #     NNTP uploads go direct for full upload speed.
    #     → comment out network_mode, use default networking.
    network_mode: "${AGENT_NETWORK_MODE:-service:vpn}"
    depends_on:
      - vpn
    environment:
      # Site connection
      - SITE_URL=${SITE_URL:?Set SITE_URL in .env}
      - AGENT_TOKEN=${AGENT_TOKEN:?Set AGENT_TOKEN in .env}
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      # Directories
      - TEMP_DIR=/data/temp
      # VPN split-tunnel — set VPN_DOWNLOAD_ONLY=true to route only torrents through VPN
      - VPN_DOWNLOAD_ONLY=${VPN_DOWNLOAD_ONLY:-false}
      - VPN_PROXY_ADDR=${VPN_PROXY_ADDR:-vpn:1080}
      # NNTP / Usenet upload
      - NNTP_SERVER=${NNTP_SERVER:?Set NNTP_SERVER in .env}
      - NNTP_SSL=${NNTP_SSL:-true}
      - NNTP_CONNECTIONS=${NNTP_CONNECTIONS:-10}
      - NNTP_USER=${NNTP_USER:?Set NNTP_USER in .env}
      - NNTP_PASS=${NNTP_PASS:?Set NNTP_PASS in .env}
      - NNTP_GROUP=${NNTP_GROUP:-alt.binaries.multimedia.anime.highspeed}
      - NNTP_POSTER=${NNTP_POSTER:-agent <agent@your-domain.com>}
      - NNTP_FROM=${NNTP_FROM:-agent@your-domain.com}
      - NNTP_DOMAIN=${NNTP_DOMAIN:-your-domain.com}
      # Branding
      - GENERATOR_NAME=${GENERATOR_NAME:-usenet-pipeline}
      # Processing
      - ENCRYPT=${ENCRYPT:-true}
      - PAR2_REDUNDANCY=${PAR2_REDUNDANCY:-5}
      # Local config UI. Must bind 0.0.0.0 inside the container so the host
      # port mapping on the vpn service above can reach it — binding 127.0.0.1
      # inside docker would be unreachable from the host even with -p.
      - LOCAL_UI_PORT=${LOCAL_UI_PORT:-4869}
      - LOCAL_UI_BIND=0.0.0.0
    volumes:
      # Bind-mount so users can drop torrents into watch folders and see
      # generated NZBs from the host without docker cp / exec. DATA_DIR
      # defaults to ./data next to the compose file.
      - ${DATA_DIR:-./data}/agent:/data
    restart: unless-stopped
